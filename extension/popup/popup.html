<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booklister Helper</title>
  <style>
    :root {
      --blue: #1976d2;
      --blue-dark: #1565c0;
      --blue-soft: rgba(25, 118, 210, 0.15);
      --red: #e53935;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --surface: #fafafa;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      width: 440px;
      max-height: 560px;
      margin: 0;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
    }
    .header-text {
      flex: 1;
      min-width: 0;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      color: var(--text);
    }
    header .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .settings-btn {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }
    .settings-btn:hover {
      color: var(--blue);
      background: var(--surface);
    }
    .settings-btn:focus-visible {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      padding: 5px 10px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .toolbar button:hover {
      border-color: var(--blue);
      color: var(--blue);
    }
    .toolbar button:focus-visible {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }
    .selected-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* List area */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0;
    }
    .empty {
      padding: 28px 18px;
      color: var(--text-muted);
      text-align: center;
      font-size: 13px;
    }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.12s;
    }
    .row:hover {
      background: var(--surface);
    }
    .row input[type="checkbox"] {
      margin-top: 3px;
      flex-shrink: 0;
      accent-color: var(--blue);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }
    .row .thumb {
      width: 38px;
      height: 56px;
      flex-shrink: 0;
      background: #eee;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .row .info {
      flex: 1;
      min-width: 0;
    }
    .row .title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row .author,
    .row .call {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row .call code {
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--text);
      background: var(--surface);
      padding: 0 4px;
      border-radius: 3px;
    }

    /* Footer */
    footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    button#capture {
      flex: 1;
      padding: 9px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      color: #ffffff;
      background: var(--blue);
      border: 1px solid var(--blue);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    button#capture:hover:not(:disabled) {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
    }
    button#capture:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--blue-soft);
    }
    button#capture:disabled {
      background: #cbd5e1;
      border-color: #cbd5e1;
      color: #ffffff;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: var(--red);
      min-height: 16px;
    }
  </style>
</head>
<body>
  <header>
    <svg class="header-icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="18" y="30" width="92" height="90" rx="10" fill="#ffffff" stroke="#1976d2" stroke-width="6"/>
      <rect x="48" y="10" width="32" height="26" rx="4" fill="#1976d2"/>
      <rect x="54" y="16" width="20" height="6" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <rect x="36" y="48" width="56" height="62" rx="3" fill="#1976d2"/>
      <rect x="36" y="48" width="6" height="62" rx="3" fill="#0d47a1"/>
      <rect x="36" y="74" width="56" height="10" fill="#e53935"/>
    </svg>
    <div class="header-text">
      <h1>Booklister Helper</h1>
      <div class="meta" id="meta">Loading list…</div>
    </div>
    <button class="settings-btn" id="settings-btn" type="button" aria-label="Settings" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <div class="toolbar">
    <button id="select-all" type="button">All</button>
    <button id="select-first-13" type="button">First 13</button>
    <button id="select-none" type="button">None</button>
    <span class="selected-count" id="selected-count" aria-live="polite"></span>
  </div>

  <main id="list">
    <div class="empty">Loading…</div>
  </main>

  <footer>
    <button id="capture" type="button" disabled>Capture selected</button>
    <span id="status" class="status" role="status"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
