<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booklister Helper</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #222;
      width: 440px;
      max-height: 560px;
      margin: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid #eee;
    }
    header h1 {
      font-size: 14px;
      margin: 0 0 4px;
    }
    header .meta {
      font-size: 12px;
      color: #666;
    }
    .toolbar {
      padding: 8px 14px;
      display: flex;
      gap: 6px;
      align-items: center;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }
    .toolbar button {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
      border-radius: 4px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar .selected-count {
      margin-left: auto;
      font-size: 12px;
      color: #555;
      font-weight: 500;
    }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .empty {
      padding: 24px 14px;
      color: #888;
      text-align: center;
      font-size: 13px;
    }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .row:hover { background: #fafafa; }
    .row input[type="checkbox"] {
      margin-top: 4px;
      flex-shrink: 0;
    }
    .row .thumb {
      width: 36px;
      height: 54px;
      flex-shrink: 0;
      background: #eee;
      object-fit: cover;
      border-radius: 2px;
    }
    .row .info {
      flex: 1;
      min-width: 0;
    }
    .row .title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row .author,
    .row .call {
      font-size: 12px;
      color: #666;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row .call code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
    }
    footer {
      padding: 10px 14px;
      border-top: 1px solid #eee;
      background: #fafafa;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    footer button#capture {
      flex: 1;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #2e7d32;
      background: #2e7d32;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    footer button#capture:hover { background: #266a2a; }
    footer button#capture:disabled {
      background: #ccc;
      border-color: #ccc;
      color: #fff;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: #b00020;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Booklister Helper</h1>
    <div class="meta" id="meta">Loading list…</div>
  </header>

  <div class="toolbar">
    <button id="select-all" type="button">All</button>
    <button id="select-first-13" type="button">First 13</button>
    <button id="select-none" type="button">None</button>
    <span class="selected-count" id="selected-count" aria-live="polite"></span>
  </div>

  <main id="list">
    <div class="empty">Loading…</div>
  </main>

  <footer>
    <button id="capture" type="button" disabled>Capture selected</button>
    <span id="status" class="status" role="status"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
