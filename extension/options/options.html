<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Booklister Helper · Settings</title>
  <style>
    :root {
      --blue: #1976d2;
      --blue-dark: #1565c0;
      --blue-soft: rgba(25, 118, 210, 0.15);
      --red: #e53935;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --surface: #fafafa;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 28px 24px;
      min-width: 440px;
      max-width: 520px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
    }
    .header-text {
      flex: 1;
      min-width: 0;
    }
    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      color: var(--text);
    }
    .header-text .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .saved-indicator {
      font-size: 12px;
      color: var(--blue);
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .saved-indicator.show {
      opacity: 1;
    }
    .close-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }
    .close-btn:hover {
      color: var(--text);
      background: var(--surface);
    }
    .close-btn:focus-visible {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    /* Setting card */
    .setting {
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .setting-label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin: 0;
    }
    .setting-help {
      font-size: 12px;
      color: var(--text-muted);
      margin: 4px 0 12px;
    }
    .setting-help.last {
      margin-bottom: 0;
    }

    /* Text input */
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }
    input[type="text"]::placeholder {
      color: #9ca3af;
    }

    /* Toggle row layout */
    .toggle-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .toggle-info {
      flex: 1;
      min-width: 0;
    }
    .toggle-info .setting-help {
      margin-bottom: 0;
    }

    /* iOS-style toggle switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #d1d5db;
      transition: background 0.18s;
      border-radius: 22px;
    }
    .toggle-slider::before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background: #ffffff;
      transition: transform 0.18s;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }
    .toggle input:checked + .toggle-slider {
      background: var(--blue);
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }
    .toggle input:focus-visible + .toggle-slider {
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    /* Sub-row for managing the accumulated list */
    .list-manage {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .list-manage-info .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .list-manage-info .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    button.clear {
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    button.clear:hover:not(:disabled) {
      border-color: var(--red);
      color: var(--red);
    }
    button.clear:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Footer */
    .footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--blue);
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg class="header-icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="18" y="30" width="92" height="90" rx="10" fill="#ffffff" stroke="#1976d2" stroke-width="6"/>
      <rect x="48" y="10" width="32" height="26" rx="4" fill="#1976d2"/>
      <rect x="54" y="16" width="20" height="6" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <rect x="36" y="48" width="56" height="62" rx="3" fill="#1976d2"/>
      <rect x="36" y="48" width="6" height="62" rx="3" fill="#0d47a1"/>
      <rect x="36" y="74" width="56" height="10" fill="#e53935"/>
    </svg>
    <div class="header-text">
      <h1>Booklister Helper</h1>
      <div class="subtitle">Settings</div>
    </div>
    <span class="saved-indicator" id="saved" role="status" aria-live="polite">Saved</span>
    <button class="close-btn" id="close-btn" type="button" aria-label="Close settings" title="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="setting">
    <label class="setting-label" for="preferred-branch">Preferred branch</label>
    <div class="setting-help">Pin captures to a specific branch. Leave blank to auto-detect.</div>
    <input
      id="preferred-branch"
      type="text"
      placeholder="e.g. San Rafael Downtown"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <div class="setting">
    <div class="toggle-row">
      <div class="toggle-info">
        <div class="setting-label">Accumulate captures</div>
        <div class="setting-help last">Each single-book capture adds to a running list instead of replacing the clipboard.</div>
      </div>
      <label class="toggle">
        <input id="accumulate-mode" type="checkbox" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="list-manage">
      <div class="list-manage-info">
        <div class="label">Accumulated list</div>
        <div class="meta" id="accumulate-count">Empty</div>
      </div>
      <button id="clear-list" class="clear" type="button" disabled>Clear</button>
    </div>
  </div>

  <div class="footer">
    <a href="https://booklister.org/extension.html" target="_blank" rel="noopener">Learn more about Booklister Helper</a>
  </div>

  <script src="options.js"></script>
</body>
</html>
