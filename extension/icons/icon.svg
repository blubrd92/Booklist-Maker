<?xml version="1.0" encoding="UTF-8"?>
<!--
  Booklister Helper icon (master source).

  Design: a clipboard with a single book cover inside it, where the book
  carries the indigo + red signature of the Booklister brand. The
  clipboard metaphor signals "capture / copy" (the extension's job); the
  inner book + bar visually pairs the extension with the main tool.

  ViewBox 128x128 so the masters render cleanly at 128, 48, and 16
  without manual hinting. Render to PNG at:
    icons/icon-16.png   (16x16)
    icons/icon-48.png   (48x48)
    icons/icon-128.png  (128x128)
  using any rasterizer (inkscape, rsvg-convert, ImageMagick, Figma).

  Colors mirror the Booklister website palette (assets/css/styles.css):
    #5c6bc0 = Booklister indigo (the primary-color token)
    #3949ab = darker indigo (book spine accent)
    #d32f2f = deep red (the signature bar, the brand's pop of contrast)

  As a small accent, the red bar reads bold against the indigo without
  the two large color fields fighting. A fire-engine red was a touch
  loud against the muted indigo, so this sits a step deeper.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Booklister Helper icon">
  <!-- Clipboard body: white fill, thick indigo stroke so it survives at 48x48. -->
  <rect x="18" y="30" width="92" height="90" rx="10" fill="#ffffff" stroke="#5c6bc0" stroke-width="6"/>

  <!-- Clipboard clip at the top: indigo rectangle with a small white inset
       suggesting the spring mechanism. The clip is the primary visual
       differentiator from the main Booklister favicon. -->
  <rect x="48" y="10" width="32" height="26" rx="4" fill="#5c6bc0"/>
  <rect x="54" y="16" width="20" height="6" rx="1.5" fill="#ffffff" opacity="0.85"/>

  <!-- Inside the clipboard: a single book cover (indigo) with a darker
       indigo spine on the left and the signature bar across the middle,
       so the extension reads as a Booklister product at a glance. -->
  <rect x="36" y="48" width="56" height="62" rx="3" fill="#5c6bc0"/>
  <rect x="36" y="48" width="6" height="62" rx="3" fill="#3949ab"/>

  <!-- The signature bar, in deep red: the brand's pop of contrast.
       Keep it prominent: it stays recognizable even at 16x16 when
       finer details (the clipboard stroke, the clip's spring) wash out. -->
  <rect x="36" y="74" width="56" height="10" fill="#d32f2f"/>
</svg>
